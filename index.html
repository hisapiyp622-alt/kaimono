<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>買い物リスト</title>
<meta name="theme-color" content="#F4F5F1" />
<!-- iPhone：ホーム画面から独立アプリとして起動 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="買い物リスト" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#233D2E; --paper:#F4F5F1; --card:#FFFFFF; --accent:#E8843C;
    --done:#3E9E6B; --muted:#7A8579; --line:#E6E8E1; --faint:#AEB6AC;
    --font: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    font-family:var(--font); background:var(--paper); color:var(--ink);
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap{ max-width:560px; margin:0 auto; }
  .tnum{ font-variant-numeric: tabular-nums; }

  header{ position:sticky; top:0; z-index:5; background:var(--paper); border-bottom:1px solid var(--line); }
  .head-pad{ padding:20px 18px 12px; }
  .titlerow{ display:flex; align-items:baseline; justify-content:space-between; }
  .title{ font-size:20px; font-weight:900; letter-spacing:.5px; }
  .remain{ font-size:13px; color:var(--muted); font-weight:700; }

  .track{ height:6px; background:var(--line); border-radius:6px; margin-top:10px; overflow:hidden; }
  .fill{ height:100%; background:var(--done); border-radius:6px; width:0%; transition:width .25s ease; }

  .inputrow{ display:flex; gap:8px; margin-top:12px; }
  #name{
    flex:1; padding:13px 14px; border-radius:12px; border:1.5px solid var(--line);
    background:var(--card); font-size:16px; font-family:var(--font); color:var(--ink); outline:none;
  }
  #name:focus{ border-color:var(--accent); }
  #add{
    width:50px; flex-shrink:0; border:none; border-radius:12px; background:var(--accent);
    color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }

  .sectionlabel{ font-size:11px; font-weight:800; letter-spacing:.5px; color:var(--muted); margin-top:14px; margin-bottom:6px; }

  .chips{ display:flex; gap:8px; overflow-x:auto; margin-top:0; padding-bottom:2px; -webkit-overflow-scrolling:touch; touch-action:pan-x; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; display:flex; align-items:center; gap:6px; padding:7px 12px; border-radius:999px;
    cursor:pointer; font-family:var(--font); font-size:13px; font-weight:700;
    border:1.5px solid var(--line); background:var(--card); color:var(--muted);
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  .chip .dot{ width:8px; height:8px; border-radius:4px; }
  .chip.quick{ border-color:var(--accent); color:var(--accent); background:#fff; }
  .chip.quick:active{ background:var(--accent); color:#fff; }
  .chip.addchip{ border:1.5px dashed var(--faint); color:var(--muted); background:transparent; }
  .chip.storechip{ padding:0 6px 0 12px; gap:2px; }
  .chip.dragging{ box-shadow:0 6px 16px rgba(35,61,46,.25); transform:scale(1.06); z-index:3; position:relative; }
  .storeSelect{ background:none; border:none; padding:7px 4px 7px 0; font:inherit; color:inherit;
    cursor:pointer; display:flex; align-items:center; gap:6px; }
  .storeDel{ background:none; border:none; padding:4px 4px; cursor:pointer; color:inherit; opacity:.55; font-size:14px; line-height:1; }
  .storeform{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .storeInput{
    width:128px; padding:6px 12px; border-radius:999px; border:1.5px solid var(--accent);
    font-family:var(--font); font-size:13px; outline:none; background:var(--card); color:var(--ink);
  }
  .storeOk, .storeCancel{ font-size:15px; font-weight:900; line-height:1; }
  .storeOk{ color:var(--done); border-color:var(--done); }
  .storeCancel{ color:var(--muted); }

  .syncBox{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .syncMsg{ font-size:11px; color:var(--muted); margin-top:6px; min-height:14px; }
  .syncMsg.err{ color:#D9534F; }

  main{ padding:8px 18px 24px; }
  .empty{ text-align:center; color:var(--faint); padding:60px 20px; font-size:15px; line-height:1.7; }

  .group{ margin-top:16px; }
  .ghead{ display:flex; align-items:center; gap:7px; margin-bottom:8px; }
  .ghead .dot{ width:10px; height:10px; border-radius:5px; }
  .glabel{ font-size:12px; font-weight:800; letter-spacing:1px; color:var(--muted); }
  .gcount{ font-size:11px; color:var(--faint); }

  .item{
    display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:10px 8px 10px 12px; margin-bottom:8px;
  }
  .tap{ flex:1; display:flex; align-items:center; gap:10px; background:none; border:none; padding:0;
        cursor:pointer; text-align:left; font-family:var(--font); min-width:0; }
  .box{ width:24px; height:24px; border-radius:13px; flex-shrink:0; border:2px solid var(--faint);
        display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .box.on{ background:var(--done); border-color:var(--done); }
  .iname{ font-size:16px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis;
           white-space:nowrap; transition:color .15s; }
  .iname.on{ color:var(--faint); text-decoration:line-through; }

  .qty{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
  .qbtn{ width:22px; height:22px; border-radius:7px; border:1.5px solid var(--line); background:var(--paper);
         color:var(--ink); font-size:13px; font-weight:700; display:flex; align-items:center;
         justify-content:center; cursor:pointer; padding:0; line-height:1; }
  .qbtn:active{ background:var(--line); }
  .qnum{ min-width:16px; text-align:center; font-size:14px; font-weight:700; }

  .star{ background:none; border:none; padding:6px; cursor:pointer; flex-shrink:0; display:flex; }
  .del{ background:none; border:none; padding:6px; cursor:pointer; flex-shrink:0; display:flex; }

  .actions{ display:flex; gap:10px; margin-top:22px; }
  .btn{ flex:1; padding:12px; border-radius:12px; font-family:var(--font); font-weight:700; font-size:14px;
        cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
  .btn.copy{ border:1px solid var(--ink); background:transparent; color:var(--ink); }
  .btn.copy.done{ background:var(--ink); color:#fff; }
  .btn.clear{ border:1px solid var(--line); background:transparent; color:var(--muted); }
  svg{ display:block; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-pad">
      <div class="titlerow">
        <div class="title">買い物リスト</div>
        <div class="remain tnum" id="remain"></div>
      </div>
      <div class="track" id="track" style="display:none"><div class="fill" id="fill"></div></div>
      <div class="inputrow">
        <input id="name" placeholder="品名（例：牛乳）" autocomplete="off" />
        <button id="add" aria-label="追加">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <div class="sectionlabel">よく買うもの（タップで追加）</div>
      <div class="chips quick" id="quickChips"></div>

      <div class="sectionlabel">お店</div>
      <div class="chips" id="storeChips"></div>

      <div class="sectionlabel">他の端末と同期</div>
      <div class="syncBox" id="syncBox"></div>
      <div class="syncMsg" id="syncMsg"></div>
    </div>
  </header>
  <main id="list"></main>
</div>

<script>
(function(){
  "use strict";
  var KEY = "shopping-list-v1";
  var PRESETS = ["牛乳","卵","パン","お米","トイレットペーパー","ティッシュ","醤油","洗剤"];
  var STORE_COLORS = ["#4CAF6D","#D9534F","#E0A33E","#C98A3C","#8A6BB0","#3E8FB0","#6E8BA6","#9AA39B"];

  var state = { items:[], stores:[], favorites:[], currentStore:"", quickOrder:[] };
  var addingStore = false; // 一時的な表示状態（保存しない）
  var suppressClick = false; // 長押し並び替え直後のクリック誤発火を防ぐ

  // ---- 他の端末との同期（Firebase）----
  var fbApp=null, fbAuth=null, fbDb=null, fbRef=null, fbSet=null, fbGet=null, fbOnValue=null;
  var fbReady = false;
  var fbLoadPromise = null;
  var SYNC_KEY = "shopping-list-sync-v1";
  var syncCfg = { code:"", clientId:"" };
  var syncStatus = "off"; // off | connecting | on | error
  var syncJoinMode = false; // コード入力フォームの表示状態（保存しない）
  var applyingRemote = false; // クラウドから受信した更新を反映中フラグ（再送信を防ぐ）
  var syncListenerUnsub = null;
  var syncPushTimer = null;
  var authReady = false;
  var authQueue = [];

  function load(){
    try{
      var raw = localStorage.getItem(KEY);
      if(raw){
        var d = JSON.parse(raw);
        if(d && Array.isArray(d.items)){
          state.items = d.items.map(function(i){
            return {
              id: i.id || uid(),
              name: i.name,
              qty: (typeof i.qty === "number" && i.qty > 0) ? i.qty : 1,
              store: i.store || "",
              done: !!i.done
            };
          });
        }
        if(d && Array.isArray(d.stores)) state.stores = d.stores;
        if(d && Array.isArray(d.favorites)) state.favorites = d.favorites;
        if(d && typeof d.currentStore === "string") state.currentStore = d.currentStore;
        if(d && Array.isArray(d.quickOrder)) state.quickOrder = d.quickOrder;
      }
    }catch(e){}
  }
  function save(){
    try{
      localStorage.setItem(KEY, JSON.stringify({
        version:2, items:state.items, stores:state.stores,
        favorites:state.favorites, currentStore:state.currentStore,
        quickOrder:state.quickOrder
      }));
    }catch(e){}
    if(syncCfg.code && !applyingRemote) schedulePush();
  }
  function uid(){ return Math.random().toString(36).slice(2,9); }
  function esc(s){ return String(s).replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }

  var $name = document.getElementById("name");
  var $list = document.getElementById("list");
  var $quick = document.getElementById("quickChips");
  var $stores = document.getElementById("storeChips");
  var $remain = document.getElementById("remain");
  var $track = document.getElementById("track");
  var $fill = document.getElementById("fill");
  var $sync = document.getElementById("syncBox");
  var $syncMsg = document.getElementById("syncMsg");

  // icons
  var ICON = {
    check:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    x:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#AEB6AC" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    copy:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
    trash:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
    starOn:'<svg width="16" height="16" viewBox="0 0 24 24" fill="#E8843C" stroke="#E8843C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    starOff:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#AEB6AC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
  };

  // ---- 並び替え（長押しドラッグ） ----
  // container 内の itemSelector に一致する要素を、長押し（ホールド）してから
  // ドラッグすると並び替えできるようにする。通常のタップ／横スワイプは妨げない。
  function enableReorder(container, opts){
    var HOLD_MS = 420;
    var MOVE_CANCEL = 10;
    var holdTimer = null;
    var dragEl = null;
    var dragging = false;
    var startX = 0, startY = 0;

    function items(){ return Array.prototype.slice.call(container.querySelectorAll(opts.itemSelector)); }
    function clearHold(){ if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; } }

    function onMove(e){
      if(!dragEl) return;
      if(!dragging){
        var dx = Math.abs(e.clientX - startX), dy = Math.abs(e.clientY - startY);
        if(dx > MOVE_CANCEL || dy > MOVE_CANCEL) clearHold();
        return;
      }
      e.preventDefault();
      var x = e.clientX;
      var siblings = items().filter(function(el){ return el !== dragEl; });
      var target = null;
      for(var i=0;i<siblings.length;i++){
        var r = siblings[i].getBoundingClientRect();
        if(x < r.left + r.width/2){ target = siblings[i]; break; }
      }
      if(target){
        container.insertBefore(dragEl, target);
      } else if(opts.boundarySelector){
        var boundary = container.querySelector(opts.boundarySelector);
        if(boundary) container.insertBefore(dragEl, boundary);
        else container.appendChild(dragEl);
      } else {
        container.appendChild(dragEl);
      }
    }
    function onUp(){
      clearHold();
      container.removeEventListener("pointermove", onMove);
      container.removeEventListener("pointerup", onUp);
      container.removeEventListener("pointercancel", onUp);
      if(dragging){
        dragging = false;
        container.classList.remove("sorting");
        if(dragEl) dragEl.classList.remove("dragging");
        var newIds = items().map(function(el){ return el.getAttribute(opts.idAttr); });
        suppressClick = true;
        setTimeout(function(){ suppressClick = false; }, 0);
        opts.onReorder(newIds);
      }
      dragEl = null;
    }
    container.addEventListener("pointerdown", function(e){
      if(dragging) return;
      var el = e.target.closest(opts.itemSelector);
      if(!el || !container.contains(el)) return;
      dragEl = el; startX = e.clientX; startY = e.clientY;
      clearHold();
      holdTimer = setTimeout(function(){
        if(!dragEl) return;
        dragging = true;
        container.classList.add("sorting");
        dragEl.classList.add("dragging");
        if(navigator.vibrate){ try{ navigator.vibrate(10); }catch(err){} }
      }, HOLD_MS);
      container.addEventListener("pointermove", onMove, {passive:false});
      container.addEventListener("pointerup", onUp);
      container.addEventListener("pointercancel", onUp);
    });
  }

  // ---- よく買うもの（クイック追加） ----
  function getQuickNames(){
    var names = PRESETS.slice();
    state.favorites.forEach(function(n){ if(names.indexOf(n) === -1) names.push(n); });
    return names;
  }
  function syncQuickOrder(){
    var names = getQuickNames();
    state.quickOrder = state.quickOrder.filter(function(n){ return names.indexOf(n) !== -1; });
    names.forEach(function(n){ if(state.quickOrder.indexOf(n) === -1) state.quickOrder.push(n); });
  }
  function renderQuick(){
    syncQuickOrder();
    var html = "";
    state.quickOrder.forEach(function(n){
      html += '<button class="chip quick" data-quick="'+esc(n)+'">'+esc(n)+'</button>';
    });
    $quick.innerHTML = html;
    Array.prototype.forEach.call($quick.querySelectorAll("[data-quick]"), function(el){
      el.onclick = function(){ if(suppressClick) return; addQuick(el.getAttribute("data-quick")); };
    });
  }
  function addQuick(name){
    state.items.push({ id:uid(), name:name, qty:1, store:state.currentStore, done:false });
    save(); render();
  }
  function isFav(name){ return state.favorites.indexOf(name) !== -1; }
  function toggleFav(name){
    var idx = state.favorites.indexOf(name);
    if(idx === -1) state.favorites.push(name); else state.favorites.splice(idx,1);
    save(); render();
  }

  // ---- お店 ----
  function renderStores(){
    var html = "";
    state.stores.forEach(function(s){
      var on = s.key === state.currentStore;
      html += '<span class="chip storechip" data-storekey="'+s.key+'"'
        + (on ? ' style="background:'+s.color+';border-color:'+s.color+';color:#fff;"' : '')
        + '>'
        + '<button class="storeSelect" data-store="'+s.key+'">'
        +   '<span class="dot" style="background:'+(on?"#fff":s.color)+'"></span>'+esc(s.label)
        + '</button>'
        + '<button class="storeDel" data-storedel="'+s.key+'" aria-label="店舗を削除">&times;</button>'
        + '</span>';
    });
    if(addingStore){
      html += '<span class="storeform">'
        + '<input id="storeInput" class="storeInput" placeholder="お店の名前" autocomplete="off" />'
        + '<button class="qbtn storeOk" id="storeOkBtn" aria-label="追加">&#10003;</button>'
        + '<button class="qbtn storeCancel" id="storeCancelBtn" aria-label="キャンセル">&times;</button>'
        + '</span>';
    } else {
      html += '<button class="chip addchip" id="addStoreBtn">＋ 店舗を追加</button>';
    }
    $stores.innerHTML = html;
    Array.prototype.forEach.call($stores.querySelectorAll("[data-store]"), function(el){
      el.onclick = function(){
        if(suppressClick) return;
        state.currentStore = el.getAttribute("data-store"); save(); renderStores();
      };
    });
    Array.prototype.forEach.call($stores.querySelectorAll("[data-storedel]"), function(el){
      el.onclick = function(e){ e.stopPropagation(); deleteStore(el.getAttribute("data-storedel")); };
    });
    if(addingStore){
      var input = document.getElementById("storeInput");
      if(input){
        input.focus();
        input.addEventListener("keydown", function(e){
          if(e.key === "Enter") commitStore();
          if(e.key === "Escape") cancelAddStore();
        });
      }
      var okBtn = document.getElementById("storeOkBtn"); if(okBtn) okBtn.onclick = commitStore;
      var cancelBtn = document.getElementById("storeCancelBtn"); if(cancelBtn) cancelBtn.onclick = cancelAddStore;
    } else {
      var addBtn = document.getElementById("addStoreBtn");
      if(addBtn) addBtn.onclick = function(){ addingStore = true; renderStores(); };
    }
  }
  function commitStore(){
    var input = document.getElementById("storeInput");
    var name = input ? input.value.trim() : "";
    addingStore = false;
    if(!name){ renderStores(); return; }
    var exists = state.stores.filter(function(s){ return s.label === name; })[0];
    if(exists){
      state.currentStore = exists.key;
    } else {
      var color = STORE_COLORS[state.stores.length % STORE_COLORS.length];
      var s = { key:uid(), label:name, color:color };
      state.stores.push(s);
      state.currentStore = s.key;
    }
    save(); render();
  }
  function cancelAddStore(){
    addingStore = false;
    renderStores();
  }
  function deleteStore(key){
    state.stores = state.stores.filter(function(s){ return s.key !== key; });
    // この店舗の商品は「お店未設定」に戻す（削除はしない）
    state.items = state.items.map(function(i){
      return i.store === key ? Object.assign({}, i, {store:""}) : i;
    });
    if(state.currentStore === key) state.currentStore = "";
    save(); render();
  }

  // ---- 他の端末と同期 ----
  function loadSyncCfg(){
    try{
      var raw = localStorage.getItem(SYNC_KEY);
      if(raw){
        var d = JSON.parse(raw);
        if(d && typeof d.code === "string") syncCfg.code = d.code;
        if(d && typeof d.clientId === "string") syncCfg.clientId = d.clientId;
      }
    }catch(e){}
    if(!syncCfg.clientId) syncCfg.clientId = uid()+uid()+uid();
    syncStatus = syncCfg.code ? "connecting" : "off";
    saveSyncCfg();
  }
  function saveSyncCfg(){
    try{ localStorage.setItem(SYNC_KEY, JSON.stringify(syncCfg)); }catch(e){}
  }
  function genSyncCode(){
    var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 0/O, 1/I など紛らわしい文字は除外
    var s = "";
    for(var i=0;i<6;i++) s += chars.charAt(Math.floor(Math.random()*chars.length));
    return s;
  }
  function whenAuthReady(fn){
    if(authReady) fn(); else authQueue.push(fn);
  }
  function ensureFirebase(){
    if(fbReady) return Promise.resolve();
    if(!fbLoadPromise) fbLoadPromise = loadFirebase();
    return fbLoadPromise;
  }
  function loadFirebase(){
    return Promise.all([
      import("https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js"),
      import("https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js")
    ]).then(function(mods){
      var appMod = mods[0], dbMod = mods[1], authMod = mods[2];
      var firebaseConfig = {
        apiKey: "AIzaSyDW4K6NU8vcDdKT79wqPhtiuWXQX2rFmV8",
        authDomain: "kaimono-sync.firebaseapp.com",
        databaseURL: "https://kaimono-sync-default-rtdb.firebaseio.com",
        projectId: "kaimono-sync",
        storageBucket: "kaimono-sync.firebasestorage.app",
        messagingSenderId: "543116430313",
        appId: "1:543116430313:web:c405b35720427a88369978"
      };
      fbApp = appMod.initializeApp(firebaseConfig);
      fbAuth = authMod.getAuth(fbApp);
      fbDb = dbMod.getDatabase(fbApp);
      fbRef = dbMod.ref; fbSet = dbMod.set; fbGet = dbMod.get; fbOnValue = dbMod.onValue;
      fbReady = true;
      authMod.onAuthStateChanged(fbAuth, function(user){
        authReady = !!user;
        if(authReady){
          var q = authQueue; authQueue = [];
          q.forEach(function(fn){ try{ fn(); }catch(e){} });
          if(syncCfg.code) startSyncListener();
        }
      });
      return authMod.signInAnonymously(fbAuth);
    }).catch(function(e){
      fbReady = false;
      setSyncStatus("error");
      throw e;
    });
  }
  function startSyncListener(){
    if(!fbReady || !syncCfg.code) return;
    stopSyncListener();
    setSyncStatus("connecting");
    var r = fbRef(fbDb, "lists/"+syncCfg.code);
    syncListenerUnsub = fbOnValue(r, function(snap){
      setSyncStatus("on");
      var val = snap.val();
      if(!val || !val.state) return;
      if(val.clientId === syncCfg.clientId) return; // 自分が送った変更は無視（エコー防止）
      applyRemoteState(val.state);
    }, function(err){
      setSyncStatus("error");
    });
  }
  function stopSyncListener(){
    if(syncListenerUnsub){
      try{ syncListenerUnsub(); }catch(e){}
      syncListenerUnsub = null;
    }
  }
  function schedulePush(){
    if(syncPushTimer) clearTimeout(syncPushTimer);
    syncPushTimer = setTimeout(function(){
      syncPushTimer = null;
      ensureFirebase().then(function(){ whenAuthReady(pushStateToCloud); })
        .catch(function(){ setSyncStatus("error"); });
    }, 400);
  }
  function pushStateToCloud(){
    if(!fbReady || !syncCfg.code) return;
    var r = fbRef(fbDb, "lists/"+syncCfg.code);
    fbSet(r, {
      state: {
        items: state.items, stores: state.stores, favorites: state.favorites,
        currentStore: state.currentStore, quickOrder: state.quickOrder
      },
      clientId: syncCfg.clientId,
      updatedAt: Date.now()
    }).catch(function(e){ setSyncStatus("error"); });
  }
  function applyRemoteState(remote){
    applyingRemote = true;
    try{
      if(remote && Array.isArray(remote.items)){
        state.items = remote.items.map(function(i){
          return {
            id: i.id || uid(),
            name: i.name,
            qty: (typeof i.qty === "number" && i.qty > 0) ? i.qty : 1,
            store: i.store || "",
            done: !!i.done
          };
        });
      }
      if(remote && Array.isArray(remote.stores)) state.stores = remote.stores;
      if(remote && Array.isArray(remote.favorites)) state.favorites = remote.favorites;
      if(remote && typeof remote.currentStore === "string") state.currentStore = remote.currentStore;
      if(remote && Array.isArray(remote.quickOrder)) state.quickOrder = remote.quickOrder;
      save(); render();
    }catch(e){}
    applyingRemote = false;
  }
  function createSync(){
    setSyncStatus("connecting");
    ensureFirebase().then(function(){
      whenAuthReady(function(){
        var code = genSyncCode();
        syncCfg.code = code;
        saveSyncCfg();
        pushStateToCloud();
        startSyncListener();
        renderSyncBox();
      });
    }).catch(function(){ setSyncStatus("error"); });
  }
  function joinSync(code){
    setSyncStatus("connecting");
    ensureFirebase().then(function(){
      whenAuthReady(function(){
        var r = fbRef(fbDb, "lists/"+code);
        fbGet(r).then(function(snap){
          var val = snap.val();
          syncCfg.code = code;
          saveSyncCfg();
          if(val && val.state){
            applyRemoteState(val.state);
          } else {
            pushStateToCloud();
          }
          startSyncListener();
          renderSyncBox();
        }).catch(function(){ setSyncStatus("error"); });
      });
    }).catch(function(){ setSyncStatus("error"); });
  }
  function disconnectSync(){
    stopSyncListener();
    syncCfg.code = "";
    saveSyncCfg();
    setSyncStatus("off");
  }
  function setSyncStatus(s){
    syncStatus = s;
    renderSyncBox();
  }
  function statusLabel(){
    if(syncStatus === "connecting") return { text:"接続中…", err:false };
    if(syncStatus === "error") return { text:"接続できませんでした。電波の良い場所で再度お試しください。", err:true };
    if(syncStatus === "on") return { text:"自動で同期しています", err:false };
    return { text:"", err:false };
  }
  function renderSyncBox(){
    var html = "";
    if(syncCfg.code){
      html += '<span class="chip storechip" style="background:var(--done);border-color:var(--done);color:#fff;">'
        +   '<span class="dot" style="background:#fff"></span>コード: '+esc(syncCfg.code)
        + '</span>'
        + '<button class="chip addchip" id="copySyncBtn">コピー</button>'
        + '<button class="chip addchip" id="unsyncBtn">同期を解除</button>';
      $sync.innerHTML = html;
      var copyBtn = document.getElementById("copySyncBtn"); if(copyBtn) copyBtn.onclick = copySyncCode;
      var unsyncBtn = document.getElementById("unsyncBtn"); if(unsyncBtn) unsyncBtn.onclick = disconnectSync;
      var label = statusLabel();
      $syncMsg.textContent = label.text;
      $syncMsg.className = "syncMsg" + (label.err ? " err" : "");
    } else if(syncJoinMode){
      html += '<span class="storeform">'
        + '<input id="joinCodeInput" class="storeInput" style="width:120px;text-transform:uppercase;" placeholder="6桁のコード" autocomplete="off" maxlength="6" />'
        + '<button class="qbtn storeOk" id="joinOkBtn">&#10003;</button>'
        + '<button class="qbtn storeCancel" id="joinCancelBtn">&times;</button>'
        + '</span>';
      $sync.innerHTML = html;
      var input = document.getElementById("joinCodeInput");
      if(input){
        input.focus();
        input.addEventListener("keydown", function(e){
          if(e.key === "Enter") commitJoin();
          if(e.key === "Escape") cancelJoin();
        });
      }
      var okBtn = document.getElementById("joinOkBtn"); if(okBtn) okBtn.onclick = commitJoin;
      var cancelBtn = document.getElementById("joinCancelBtn"); if(cancelBtn) cancelBtn.onclick = cancelJoin;
      $syncMsg.textContent = "";
    } else {
      html += '<button class="chip quick" id="createSyncBtn">＋ 同期コードを作成</button>'
        + '<button class="chip addchip" id="joinSyncBtn">コードで参加</button>';
      $sync.innerHTML = html;
      var createBtn = document.getElementById("createSyncBtn"); if(createBtn) createBtn.onclick = createSync;
      var joinBtn = document.getElementById("joinSyncBtn"); if(joinBtn) joinBtn.onclick = function(){ syncJoinMode = true; renderSyncBox(); };
      $syncMsg.textContent = "";
    }
  }
  function commitJoin(){
    var input = document.getElementById("joinCodeInput");
    var code = input ? input.value.trim().toUpperCase() : "";
    syncJoinMode = false;
    if(!code){ renderSyncBox(); return; }
    joinSync(code);
  }
  function cancelJoin(){
    syncJoinMode = false;
    renderSyncBox();
  }
  function copySyncCode(){
    var txt = syncCfg.code;
    var btn = document.getElementById("copySyncBtn");
    function flash(){
      if(btn){ btn.textContent = "コピーしました"; setTimeout(function(){ if(btn) btn.textContent = "コピー"; }, 1500); }
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(flash).catch(function(){ fallbackCopy(txt); flash(); });
    } else { fallbackCopy(txt); flash(); }
  }

  // ---- メインリスト ----
  function render(){
    var total = state.items.length;
    var done = state.items.filter(function(i){return i.done;}).length;
    var remaining = total - done;
    var pct = total ? Math.round(done/total*100) : 0;

    $remain.textContent = total===0 ? "" : (remaining===0 ? "完了！🎉" : "残り "+remaining+" / "+total);
    $track.style.display = total ? "block" : "none";
    $fill.style.width = pct + "%";

    renderQuick();
    renderStores();
    renderSyncBox();

    if(total===0){
      $list.innerHTML = '<div class="empty">リストは空です。<br>上の欄から品物を追加しましょう。</div>';
      return;
    }

    var groups = state.stores.map(function(s){ return { key:s.key, label:s.label, color:s.color }; });
    groups.push({ key:"", label:"お店未設定", color:"#9AA39B" });

    var html = "";
    groups.forEach(function(g){
      var list = state.items.filter(function(i){ return (i.store||"") === g.key; })
        .sort(function(a,b){ return (a.done?1:0)-(b.done?1:0); });
      if(!list.length) return;
      var notDone = list.filter(function(i){return !i.done;}).length;
      html += '<div class="group"><div class="ghead">'
        + '<span class="dot" style="background:'+g.color+'"></span>'
        + '<span class="glabel">'+esc(g.label)+'</span>'
        + '<span class="gcount tnum">'+notDone+' / '+list.length+'</span></div>';
      list.forEach(function(i){
        var fav = isFav(i.name);
        html += '<div class="item">'
          + '<button class="tap" data-toggle="'+i.id+'">'
          +   '<span class="box'+(i.done?" on":"")+'">'+(i.done?ICON.check:"")+'</span>'
          +   '<span class="iname'+(i.done?" on":"")+'">'+esc(i.name)+'</span>'
          + '</button>'
          + '<div class="qty">'
          +   '<button class="qbtn" data-dec="'+i.id+'" aria-label="減らす">－</button>'
          +   '<span class="qnum tnum">'+(i.qty||1)+'</span>'
          +   '<button class="qbtn" data-inc="'+i.id+'" aria-label="増やす">＋</button>'
          + '</div>'
          + '<button class="star'+(fav?" on":"")+'" data-fav="'+esc(i.name)+'" aria-label="よく買うものに登録">'+(fav?ICON.starOn:ICON.starOff)+'</button>'
          + '<button class="del" data-del="'+i.id+'" aria-label="削除">'+ICON.x+'</button>'
          + '</div>';
      });
      html += '</div>';
    });

    // actions
    html += '<div class="actions">'
      + '<button class="btn copy" id="copyBtn">'+ICON.copy+'<span id="copyTxt">リストをコピー</span></button>';
    if(done>0){
      html += '<button class="btn clear" id="clearBtn">'+ICON.trash+'済みを消す（'+done+'）</button>';
    }
    html += '</div>';

    $list.innerHTML = html;

    // bind
    Array.prototype.forEach.call($list.querySelectorAll("[data-toggle]"), function(el){
      el.onclick = function(){ toggle(el.getAttribute("data-toggle")); };
    });
    Array.prototype.forEach.call($list.querySelectorAll("[data-del]"), function(el){
      el.onclick = function(){ del(el.getAttribute("data-del")); };
    });
    Array.prototype.forEach.call($list.querySelectorAll("[data-inc]"), function(el){
      el.onclick = function(){ incQty(el.getAttribute("data-inc")); };
    });
    Array.prototype.forEach.call($list.querySelectorAll("[data-dec]"), function(el){
      el.onclick = function(){ decQty(el.getAttribute("data-dec")); };
    });
    Array.prototype.forEach.call($list.querySelectorAll("[data-fav]"), function(el){
      el.onclick = function(){ toggleFav(el.getAttribute("data-fav")); };
    });
    var cb = document.getElementById("copyBtn"); if(cb) cb.onclick = copyList;
    var cl = document.getElementById("clearBtn"); if(cl) cl.onclick = clearDone;
  }

  function add(){
    var n = $name.value.trim();
    if(!n) return;
    state.items.push({ id:uid(), name:n, qty:1, store:state.currentStore, done:false });
    $name.value = "";
    save(); render(); $name.focus();
  }
  function toggle(id){
    state.items = state.items.map(function(i){ return i.id===id ? Object.assign({}, i, {done:!i.done}) : i; });
    save(); render();
  }
  function del(id){
    state.items = state.items.filter(function(i){ return i.id!==id; });
    save(); render();
  }
  function incQty(id){
    state.items = state.items.map(function(i){
      return i.id===id ? Object.assign({}, i, {qty:(i.qty||1)+1}) : i;
    });
    save(); render();
  }
  function decQty(id){
    state.items = state.items.map(function(i){
      if(i.id!==id) return i;
      var q = (i.qty||1) - 1;
      if(q < 1) q = 1;
      return Object.assign({}, i, {qty:q});
    });
    save(); render();
  }
  function clearDone(){
    state.items = state.items.filter(function(i){ return !i.done; });
    save(); render();
  }
  function copyList(){
    var txt = "買い物リスト\n";
    var any = false;
    var groups = state.stores.map(function(s){ return { key:s.key, label:s.label }; });
    groups.push({ key:"", label:"お店未設定" });
    groups.forEach(function(g){
      var list = state.items.filter(function(i){ return (i.store||"")===g.key && !i.done; });
      if(!list.length) return;
      any = true;
      txt += "\n【"+g.label+"】\n";
      list.forEach(function(i){ txt += "・"+i.name+((i.qty && i.qty>1) ? " ×"+i.qty : "")+"\n"; });
    });
    if(!any) txt += "\n（買うものはありません）";
    txt = txt.trim();
    var txtEl = document.getElementById("copyTxt");
    var btnEl = document.getElementById("copyBtn");
    function flash(){
      if(txtEl) txtEl.textContent = "コピーしました";
      if(btnEl) btnEl.classList.add("done");
      setTimeout(function(){
        if(txtEl) txtEl.textContent = "リストをコピー";
        if(btnEl) btnEl.classList.remove("done");
      }, 1800);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(flash).catch(function(){ fallbackCopy(txt); flash(); });
    } else { fallbackCopy(txt); flash(); }
  }
  function fallbackCopy(txt){
    try{
      var ta = document.createElement("textarea");
      ta.value = txt; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    }catch(e){}
  }

  document.getElementById("add").onclick = add;
  $name.addEventListener("keydown", function(e){ if(e.key==="Enter") add(); });

  // 並び替え機能を一度だけ有効化（コンテナ自体は再描画されないため）
  enableReorder($quick, {
    itemSelector: ".chip.quick",
    idAttr: "data-quick",
    onReorder: function(newNames){ state.quickOrder = newNames; save(); render(); }
  });
  enableReorder($stores, {
    itemSelector: ".storechip",
    idAttr: "data-storekey",
    boundarySelector: "#addStoreBtn, .storeform",
    onReorder: function(newKeys){
      var map = {}; state.stores.forEach(function(s){ map[s.key] = s; });
      state.stores = newKeys.map(function(k){ return map[k]; }).filter(Boolean);
      save(); render();
    }
  });

  load();
  loadSyncCfg();
  render();
  if(syncCfg.code){ ensureFirebase().catch(function(){ setSyncStatus("error"); }); }
})();
</script>
</body>
</html>
